<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Evo Engineering master social card</title>
  <desc id="desc">Dark industrial Evo Engineering social card with existing logo, gold accents, and faint system blueprint background.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#030607"/><stop offset="1" stop-color="#090d0d"/></linearGradient><linearGradient id="readability" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#000" stop-opacity="0.84"/><stop offset="0.62" stop-color="#000" stop-opacity="0.46"/><stop offset="1" stop-color="#000" stop-opacity="0"/></linearGradient><filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter><style>:root { --evo-gold: #dca43a; --evo-gold-bright: #f4be4e; --evo-white: #f6f7f7; --evo-muted: #bcc1c1; --steel: #7e8886; } text { font-family: "Segoe UI", Arial, sans-serif; }</style></defs>

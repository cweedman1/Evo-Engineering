    <g fill="var(--evo-gold-bright)" fill-opacity="0.15"><circle cx="872" cy="154" r="3"/><circle cx="792" cy="232" r="3"/><circle cx="830" cy="296" r="3"/><circle cx="936" cy="319" r="3"/><circle cx="1044" cy="240" r="3"/><circle cx="1072" cy="487" r="3"/><circle cx="820" cy="430" r="3"/></g>
